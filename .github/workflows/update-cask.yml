name: Update Cask

on:
  repository_dispatch:
    types: [update-cask]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update cask version and SHA
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          SHA256="${{ github.event.client_payload.sha256 }}"
          URL="${{ github.event.client_payload.url }}"

          sed -i "s|version \".*\"|version \"${VERSION}\"|" Casks/openpaste.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Casks/openpaste.rb

          echo "Updated to v${VERSION} (sha256: ${SHA256})"

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/openpaste.rb
          git commit -m "chore: bump openpaste to v${{ github.event.client_payload.version }}"
          git push
